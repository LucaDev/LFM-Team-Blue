services:
  psbt-signer:
    build: ./psbt-signer
    container_name: psbt-signer
    restart: unless-stopped
    user: "1000:1000"
    group_add:
      - "${TPM_GID}"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    depends_on:
      - postgres
      - redis
    environment:
      SERVICE_NAME: psbt-signer
      NETWORK: test

      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

      VELOCITY_CAP_SATS: 40000000
      VELOCITY_WINDOW_SEC: 3600
      WALLET_METADATA: /psbt-signer/run/wallets/metadata.json

      REDIS_URL: redis://redis:6379/0 

      MAX_SKEW: 30 #replay protec

      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - /var/lib/signer/data:/psbt-signer/run/data
      - /var/lib/signer/wallets:/psbt-signer/run/wallets
      - /var/lib/signer/tpm:/psbt-signer/tpm
      - /var/lib/signer/hmac.secret:/psbt-signer/run/secrets/hmac.secret:ro

    devices:
      - /dev/tpm0:/dev/tpm0
      - /dev/tpmrm0:/dev/tpmrm0

    expose:
     - "8080"
     
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./psbt-signer/app/001_psbt.sql:/docker-entrypoint-initdb.d/001_psbt.sql:ro

  proxy:
    image: nginxinc/nginx-unprivileged:1.27-alpine
    container_name: signer-proxy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      - psbt-signer
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      #nur an die WireGuard-Interface-IP
      - "10.10.0.2:8080:8080"

  redis:
    image: redis:7-alpine
    container_name: signer-redis
    restart: unless-stopped
    user: "redis"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /data
    command: ["redis-server", "--save", "", "--appendonly", "no"] #TTL flüchtig
    # KEIN ports: -> nur intern im Docker-Netz erreichbar

volumes:
  postgres_data: