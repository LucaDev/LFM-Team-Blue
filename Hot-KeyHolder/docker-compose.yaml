services:
  psbt-signer:
    build: ./psbt-signer
    container_name: psbt-signer
    restart: unless-stopped
    user: "1000:1000"
    group_add:
      - "${TPM_GID}"
    environment:
      SERVICE_NAME: psbt-signer
      NETWORK: test

      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

      MAX_SKEC: 30 #replay protec
      
    volumes:
      - /var/lib/signer/data:/psbt-signer/run/data
      - /var/lib/signer/wallets:/psbt-signer/run/wallets
      - /var/lib/signer/tpm:/psbt-signer/tpm
      - ./psbt-signer/app:/psbt-signer/scripts:ro
      - /var/lib/signer/hmac.secret:/psbt-signer/run/secrets/hmac.secret:ro

    devices:
      - /dev/tpm0:/dev/tpm0
      - /dev/tpmrm0:/dev/tpmrm0

    ports:
     - "8080"
     
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
    - postgres_data:/run/postgresql/data
    - ./psbt-signer/app/001_psbt.sql:/docker-entrypoint-initdb.d/001_psbt.sql:ro

  proxy:
    image: nginx:1.27-alpine
    container_name: signer-proxy
    restart: unless-stopped
    depends_on:
      - psbt-signer
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      # Bindet EXPLIZIT nur an die WireGuard-Interface-IP (siehe
      - "10.10.0.2:8080:8080"

volumes:
  postgres_data: