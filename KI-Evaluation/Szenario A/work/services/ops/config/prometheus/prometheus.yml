global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: blackbox-exporter
    static_configs:
      - targets:
          - blackbox-exporter:9115

  - job_name: node-exporters
    static_configs:
      - targets:
          - 10.10.10.2:9100
          - 10.10.10.10:9100
          - 10.10.20.20:9100
          - 10.10.10.30:9100

  - job_name: blackbox-http-2xx
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - http://10.10.10.10:3000
          - http://10.10.10.10:8080
          - http://10.10.10.10:8081
          - http://10.10.10.10:3001
          - http://10.10.10.10:5006
          - http://10.10.10.10:8083
          - http://10.10.20.20:9090/-/ready
          - http://10.10.20.20:9093
          - http://10.10.20.20:3100/ready
          - http://10.10.20.20:9115
    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target
      - source_labels:
          - __param_target
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: blackbox-http-redirects
    metrics_path: /probe
    params:
      module:
        - http_2xx_or_3xx
    static_configs:
      - targets:
          - http://10.10.10.10:9090
          - http://10.10.10.10:8000
          - http://10.10.20.20:3000
          - http://10.10.20.20:3001
    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target
      - source_labels:
          - __param_target
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: blackbox-http-auth
    metrics_path: /probe
    params:
      module:
        - http_2xx_or_3xx_or_401
    static_configs:
      - targets:
          - http://10.10.10.10:8082
    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target
      - source_labels:
          - __param_target
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
