server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: ops-system
    static_configs:
      - targets:
          - localhost
        labels:
          job: ops-system
          __path__: /var/log/**/*.log

  - job_name: ops-docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: ops-docker
          __path__: /var/lib/docker/containers/*/*-json.log
