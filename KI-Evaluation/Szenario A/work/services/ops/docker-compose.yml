x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alerts:/etc/prometheus/alerts:ro
      - ./data/prometheus:/prometheus

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      TZ: Europe/Berlin
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro

  alertmanager:
    image: prom/alertmanager:latest
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "9093:9093"
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./data/alertmanager:/alertmanager

  ntfy:
    image: binwiederhier/ntfy:latest
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "2586:80"
    command:
      - serve
    environment:
      TZ: Europe/Berlin
    volumes:
      - ./data/ntfy/cache:/var/cache/ntfy

  alert-forwarder:
    image: python:3.12-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      NTFY_BASE_URL: http://ntfy
      NTFY_TOPIC: ${HOMELAB_ALERT_TOPIC}
    command:
      - python
      - /app/alert_forwarder.py
    volumes:
      - ./config/alert-forwarder/alert_forwarder.py:/app/alert_forwarder.py:ro

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "3001:3001"
    environment:
      TZ: Europe/Berlin
    volumes:
      - ./data/uptime-kuma:/app/data

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "3100:3100"
    command:
      - -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - ./data/loki:/loki

  promtail:
    image: grafana/promtail:latest
    restart: unless-stopped
    logging: *default-logging
    command:
      - -config.file=/etc/promtail/config.yml
    volumes:
      - ./config/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "9115:9115"
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ./config/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
