# ---------------------------------------------------------------------------
# Allgemein
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# Listener: Unverschlüsseltes MQTT (nur lokales Docker-Netzwerk!) TODO
# Für intern – NIEMALS nach außen öffnen
listener 1883 0.0.0.0
# Bind auf interne Docker-Netzwerk-IP:
# bind_address 172.24.0.0
protocol mqtt

# Authentifizierung erzwingen
allow_anonymous false
password_file /mosquitto/config/passwd

# ACL
acl_file /mosquitto/config/acl

# Listener: MQTT für externe Clients, erreicht nur über Traefik
# (TCP-Router mit TLS-Terminierung via Let's Encrypt, siehe compose/home/mosquitto.yml)
listener 8883 0.0.0.0
protocol mqtt

# Authentifizierung erzwingen
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# Listener: WebSocket, erreicht nur über Traefik
# (HTTP-Router mit TLS-Terminierung via Let's Encrypt auf dem websecure-Entrypoint)
listener 9001 0.0.0.0
protocol websockets

allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# Sicherheits-Limits
# Maximale Verbindungen
max_connections 200

# Maximale Inflight-Messages
max_inflight_messages 20

# Maximale gespeicherte Nachrichten (QoS 1+2)
max_queued_messages 1000

# Maximale Payload-Größe (10 KB)
message_size_limit 10240

# Retained Messages
retain_available true
persistent_client_expiration 1m    # Clients nach 1 Monat bereinigen
