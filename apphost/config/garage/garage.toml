# Metadaten-Verzeichnis
metadata_dir    = "/var/lib/garage/meta"
data_dir        = "/var/lib/garage/data"
db_engine       = "lmdb"

# Single Node Betrieb
replication_factor = 1

# Networking
rpc_bind_addr = "[::]:3901"

[s3_api]
s3_region       = "garage"
api_bind_addr   = "[::]:3900"

[s3_web]
bind_addr       = "[::]:3902"
root_domain     = ".web.example.com"
index           = "index.html"

[admin]
api_bind_addr   = "[::]:3903"

# Enable Metrics
[metrics]
disable = false
[compression]
# Komprimierung für kleinere Objekte
type = "zstd"
level = 1
