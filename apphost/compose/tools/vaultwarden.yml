name: apphost
networks:
  traefik-public:
    external: true
    name: traefik-public
volumes:
  vaultwarden_data: {name: apphost_vaultwarden_data}
services:
  vaultwarden:
    image: vaultwarden/server:1.32.4
    container_name: vaultwarden
    restart: unless-stopped
    runtime: runc
    networks:
      traefik-public: {}
    volumes:
      - vaultwarden_data:/data
    environment:
      TZ: Europe/Berlin
      DOMAIN: https://${VAULTWARDEN_SUBDOMAIN:-vault}.${DOMAIN}
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN:?}
      SIGNUPS_ALLOWED: "false"
      INVITATIONS_ALLOWED: "true"
      LOG_LEVEL: warn
    security_opt: ['no-new-privileges:true']
    cap_drop: [ALL]
    tmpfs:
      - /tmp:size=64m,mode=1777
    deploy:
      resources:
        limits: {cpus: "0.5", memory: 256M}
        reservations: {memory: 64M}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:80/alive"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vaultwarden.rule=Host(`${VAULTWARDEN_SUBDOMAIN:-vault}.${DOMAIN}`)"
      - "traefik.http.routers.vaultwarden.entrypoints=websecure"
      - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"
      - "traefik.http.routers.vaultwarden.middlewares=default-chain@file"
      - "traefik.http.routers.vaultwarden-tor.rule=HostRegexp(`^${VAULTWARDEN_SUBDOMAIN:-vault}\\.[a-z2-7]{16,56}\\.onion`)"
      - "traefik.http.routers.vaultwarden-tor.entrypoints=tor-http"
      - "traefik.http.routers.vaultwarden-tor.service=vaultwarden"
      - "traefik.http.routers.vaultwarden-tor.middlewares=tor-chain@file"
      - "homepage.group=Tools"
      - "homepage.name=Vaultwarden"
      - "homepage.icon=vaultwarden.png"
      - "homepage.href=https://${VAULTWARDEN_SUBDOMAIN:-vault}.${DOMAIN}"
