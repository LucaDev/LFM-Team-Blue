name: apphost
volumes:
  garage_meta: {name: apphost_garage_meta}
  garage_data: {name: apphost_garage_data}
services:
  garage:
    image: dxflrs/garage:v2.3.0@sha256:866bd13ed2038ba7e7190e840482bc27234c4afaf77be8cfa439ae088c1e4690
    container_name: garage
    restart: unless-stopped
    runtime: runc
    networks:
      storage-network:
        aliases: [garage, s3]
      traefik-public: {}
    volumes:
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
      - ../../config/garage/garage.toml:/etc/garage.toml:ro
    environment:
      GARAGE_CONFIG_FILE: /etc/garage.toml
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:?GARAGE_RPC_SECRET nicht gesetzt}
    security_opt: ['no-new-privileges:true']
    cap_drop: [ALL]
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    deploy:
      resources:
        limits: {cpus: "2.0", memory: 512M}
        reservations: {memory: 128M}
    ulimits:
      nofile: {soft: 65536, hard: 65536}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3900/health || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.garage-s3.rule=Host(`s3.${DOMAIN}`) || HostRegexp(`^.+\\.s3\\.${DOMAIN}$$`)"
      - "traefik.http.routers.garage-s3.entrypoints=websecure"
      - "traefik.http.services.garage-s3.loadbalancer.server.port=3900"
      - "traefik.http.routers.garage-s3.middlewares=default-chain@file"
      - "traefik.http.routers.garage-ui.rule=Host(`garage.${DOMAIN}`)"
      - "traefik.http.routers.garage-ui.entrypoints=websecure"
      - "traefik.http.routers.garage-ui.service=garage-ui"
      - "traefik.http.routers.garage-ui.middlewares=authelia-chain@file"
      - "traefik.http.services.garage-ui.loadbalancer.server.port=3903"
      - "homepage.group=Infrastruktur"
      - "homepage.name=Garage"
      - "homepage.icon=garage.png"
      - "homepage.href=https://garage.${DOMAIN}"
      - "homepage.description=S3 Objektspeicher"
