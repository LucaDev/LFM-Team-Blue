name: apphost
networks:
  traefik-public:
    external: true
    name: traefik-public
  media-network:
    external: true
    name: media-network
volumes:
  immich_upload: {name: apphost_immich_upload}
  immich_postgres: {name: apphost_immich_postgres}
  immich_redis: {name: apphost_immich_redis}
  immich_ml_cache: {name: apphost_immich_ml_cache}
services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:v2.7.5
    container_name: immich-server
    restart: unless-stopped
    runtime: runc
    depends_on:
      immich-postgres:
        condition: service_healthy
      immich-redis:
        condition: service_healthy
    links:
      - immich-postgres
      - immich-redis
    networks:
      media-network:
        aliases: [immich-server]
      traefik-public: {}
    volumes:
      - immich_upload:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      DB_HOSTNAME: immich-postgres
      DB_PORT: 5432
      DB_DATABASE_NAME: immich
      DB_USERNAME: immich
      DB_PASSWORD: ${IMMICH_DB_PASSWORD:?}
      REDIS_HOSTNAME: immich-redis
      REDIS_PORT: 6379
      JWT_SECRET: ${IMMICH_JWT_SECRET:?}
      UPLOAD_LOCATION: /data
      MACHINE_LEARNING_URL: http://immich-machine-learning:3003
      LOG_LEVEL: warn
      TZ: Europe/Berlin
      IMMICH_METRICS: "true"
    security_opt: ['no-new-privileges:true']
    cap_drop: [ALL]
    tmpfs:
      - /tmp:size=2g,mode=1777
    deploy:
      resources:
        limits: {cpus: "4.0", memory: 2G}
        reservations: {memory: 256M}
    healthcheck:
      disable: false
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.immich.rule=Host(`${IMMICH_SUBDOMAIN:-photos}.${DOMAIN}`)"
      - "traefik.http.routers.immich.entrypoints=websecure"
      - "traefik.http.services.immich.loadbalancer.server.port=2283"
      - "traefik.http.routers.immich.middlewares=default-chain@file"
      - "traefik.http.routers.immich-tor.rule=HostRegexp(`^${IMMICH_SUBDOMAIN:-photos}\\.[a-z2-7]{16,56}\\.onion`)"
      - "traefik.http.routers.immich-tor.entrypoints=tor-http"
      - "traefik.http.routers.immich-tor.service=immich"
      - "traefik.http.routers.immich-tor.middlewares=tor-authelia-chain@file"
      - "homepage.group=Media"
      - "homepage.name=Immich"
      - "homepage.icon=immich.png"
      - "homepage.href=https://${IMMICH_SUBDOMAIN:-photos}.${DOMAIN}"
  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v2.7.5
    container_name: immich-ml
    restart: unless-stopped
    runtime: runc
    networks: [media-network]
    volumes:
      - immich_ml_cache:/cache
    environment:
      TZ: Europe/Berlin
    security_opt: ['no-new-privileges:true']
    cap_drop: [ALL]
    deploy:
      resources:
        limits: {cpus: "4.0", memory: 4G}
        reservations: {memory: 512M}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:3003/ping')\""]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 120s
    labels:
      - "traefik.enable=false"
  immich-postgres:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich-postgres
    restart: unless-stopped
    runtime: runc
    networks: [media-network]
    volumes:
      - immich_postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD:?}
      POSTGRES_USER: immich
      POSTGRES_DB: immich
      POSTGRES_INITDB_ARGS: '--data-checksums'
      TZ: Europe/Berlin
    security_opt: ['no-new-privileges:true']
    cap_drop: [ALL]
    cap_add: [SETUID, SETGID, DAC_OVERRIDE, CHOWN]
    deploy:
      resources:
        limits: {cpus: "2.0", memory: 1G}
        reservations: {memory: 256M}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U immich -d immich"]
      interval: 30s
      timeout: 10s
      retries: 5
    shm_size: 128mb
    labels:
      - "traefik.enable=false"
  immich-redis:
    image: docker.io/valkey/valkey:8-alpine
    container_name: immich-redis
    restart: unless-stopped
    runtime: runc
    networks: [media-network]
    volumes:
      - immich_redis:/data
    security_opt: ['no-new-privileges:true']
    cap_drop: [ALL]
    user: "999:999"
    deploy:
      resources:
        limits: {cpus: "0.5", memory: 256M}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=false"
