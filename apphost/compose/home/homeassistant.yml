name: apphost
networks:
  traefik-public:
    external: true
    name: traefik-public
  home-network:
    external: true
    name: home-network
volumes:
  homeassistant_data: {name: apphost_homeassistant_data}
services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:2026.5.4@sha256:ceb1202133a5a036e8b03e20a10eb113186cc2f871968323c6fc6c3fc4205716
    container_name: homeassistant
    restart: unless-stopped
    runtime: runc
    networks:
      home-network:
        aliases: [homeassistant, hass]
      traefik-public: {}
    volumes:
      - homeassistant_data:/config
      - ../../config/homeassistant/configuration.yaml:/config/configuration.yaml
      - /etc/localtime:/etc/localtime:ro
    environment:
      TZ: Europe/Berlin
    security_opt: ['no-new-privileges:true']
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, DAC_OVERRIDE]
    tmpfs:
      - /tmp:size=256m,mode=1777
    deploy:
      resources:
        limits: {cpus: "2.0", memory: 2G}
        reservations: {memory: 256M}
    ulimits:
      nofile: {soft: 65536, hard: 65536}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8123"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 90s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hass.rule=Host(`${HOMEASSISTANT_SUBDOMAIN:-home}.${DOMAIN}`)"
      - "traefik.http.routers.hass.entrypoints=websecure"
      - "traefik.http.services.hass.loadbalancer.server.port=8123"
      - "traefik.http.routers.hass.middlewares=hass-headers@file"
      - "traefik.http.routers.hass-tor.rule=HostRegexp(`^${HOMEASSISTANT_SUBDOMAIN:-home}\\.[a-z2-7]{16,56}\\.onion`)"
      - "traefik.http.routers.hass-tor.entrypoints=tor-http"
      - "traefik.http.routers.hass-tor.service=hass"
      - "traefik.http.routers.hass-tor.middlewares=tor-hass-headers@file"
      - "homepage.group=Zuhause"
      - "homepage.name=Home Assistant"
      - "homepage.icon=home-assistant.png"
      - "homepage.href=https://${HOMEASSISTANT_SUBDOMAIN:-home}.${DOMAIN}"
