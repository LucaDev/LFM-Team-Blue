name: apphost
networks:
  traefik-public:
    external: true
    name: traefik-public
  monitoring-network:
    external: true
    name: monitoring-network
  communication-network:
    external: true
    name: communication-network
volumes:
  alertmanager_data: {name: apphost_alertmanager_data}
services:
  alertmanager:
    image: prom/alertmanager:v0.33.1@sha256:9e082985f56f4c8c9f724e18f2288c6708f472e56a5286b8863d080434ea065d
    container_name: alertmanager
    restart: unless-stopped
    runtime: runc
    networks:
      monitoring-network: {}
      traefik-public: {}
      communication-network: {}
    volumes:
      - alertmanager_data:/alertmanager
      - ../../config/alertmanager:/etc/alertmanager:ro
    command:
      - "--config.file=/etc/alertmanager/config.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=https://alertmanager.${DOMAIN}"
      - "--log.level=warn"
    user: "65534:65534"
    security_opt: ['no-new-privileges:true']
    cap_drop: [ALL]
    tmpfs:
      - /tmp:size=64m,mode=1777
    deploy:
      resources:
        limits: {cpus: "0.5", memory: 128M}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.alertmanager.rule=Host(`alertmanager.${DOMAIN}`)"
      - "traefik.http.routers.alertmanager.entrypoints=websecure"
      - "traefik.http.services.alertmanager.loadbalancer.server.port=9093"
      - "traefik.http.routers.alertmanager.middlewares=authelia-chain@file"
      - "traefik.http.routers.alertmanager-tor.rule=HostRegexp(`^alertmanager\\.[a-z2-7]{16,56}\\.onion`)"
      - "traefik.http.routers.alertmanager-tor.entrypoints=tor-http"
      - "traefik.http.routers.alertmanager-tor.service=alertmanager"
      - "traefik.http.routers.alertmanager-tor.middlewares=tor-authelia-chain@file"
