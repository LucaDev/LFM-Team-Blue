name: apphost
volumes:
  loki_data: {name: apphost_loki_data}
services:
  loki:
    image: grafana/loki:3.7.4@sha256:87f0a067673756a3cede1bcbf0c74875f7df9b09fddb53e399d0c576f756cfcc
    container_name: loki
    restart: unless-stopped
    runtime: runc
    networks: [monitoring-network]
    volumes:
      - loki_data:/loki
      - ../../config/loki:/etc/loki:ro
    command: -config.file=/etc/loki/config.yml
    user: "10001:10001"
    security_opt: ['no-new-privileges:true']
    cap_drop: [ALL]
    tmpfs:
      - /tmp:size=256m,mode=1777
      - /wal:size=512m,mode=0755
    deploy:
      resources:
        limits: {cpus: "2.0", memory: 1G}
        reservations: {memory: 256M}
    labels:
      - "traefik.enable=false"
