name: apphost
networks:
  traefik-public:
    external: true
    name: traefik-public
  monitoring-network:
    external: true
    name: monitoring-network
volumes:
  grafana_data: {name: apphost_grafana_data}
services:
  grafana:
    image: grafana/grafana-oss:13.0.1
    container_name: grafana
    restart: unless-stopped
    runtime: runc
    depends_on:
      prometheus: {condition: service_started}
      loki: {condition: service_started}
    networks:
      monitoring-network: {}
      traefik-public: {}
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../config/grafana/provisioning:/etc/grafana/provisioning:ro
    env_file:
      - ../../secrets/oidc-grafana.env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?}
      GF_SECURITY_SECRET_KEY: ${GRAFANA_SECRET_KEY:?}
      GF_SERVER_ROOT_URL: https://${GRAFANA_SUBDOMAIN:-grafana}.${DOMAIN}
      GF_DATABASE_TYPE: sqlite3
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: strict
      GF_SECURITY_STRICT_TRANSPORT_SECURITY: "true"
      GF_SECURITY_X_CONTENT_TYPE_OPTIONS: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_LOG_LEVEL: warn
      TZ: Europe/Berlin
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "Authelia"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "grafana"
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email groups"
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "https://${AUTHELIA_SUBDOMAIN:-auth}.${DOMAIN}/api/oidc/authorization"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "https://${AUTHELIA_SUBDOMAIN:-auth}.${DOMAIN}/api/oidc/token"
      GF_AUTH_GENERIC_OAUTH_API_URL: "https://${AUTHELIA_SUBDOMAIN:-auth}.${DOMAIN}/api/oidc/userinfo"
      GF_AUTH_GENERIC_OAUTH_USE_PKCE: "true"
      GF_AUTH_GENERIC_OAUTH_AUTO_LOGIN: "false"
      GF_AUTH_SIGNOUT_REDIRECT_URL: "https://${AUTHELIA_SUBDOMAIN:-auth}.${DOMAIN}/logout"
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(groups[*], 'admins') && 'Admin' || 'Viewer'"
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT: "false"
      GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN: "true"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_BASIC_ENABLED: "false"
      # Auth-Proxy NUR für den Onion-Zugriff: ForwardAuth (tor-authelia-chain)
      # liefert den Remote-User-Header -> Grafana loggt den Nutzer ein.
      # Clearnet entfernt den Header (strip-remote-user) -> dort gilt OIDC.
      # whitelist = Traefik-IP, damit kein anderer Container den Header faken kann.
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: "Remote-User"
      GF_AUTH_PROXY_HEADER_PROPERTY: "username"
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
      GF_AUTH_PROXY_SYNC_TTL: "60"
      GF_AUTH_PROXY_WHITELIST: "172.23.1.2"
      GF_AUTH_PROXY_HEADERS: "Name:Remote-Name Email:Remote-Email Groups:Remote-Groups"
      GF_AUTH_PROXY_ENABLE_LOGIN_TOKEN: "false"
    user: "472:472"
    security_opt: ['no-new-privileges:true']
    cap_drop: [ALL]
    tmpfs:
      - /tmp:size=256m,mode=1777
    deploy:
      resources:
        limits: {cpus: "2.0", memory: 512M}
        reservations: {memory: 128M}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_SUBDOMAIN:-grafana}.${DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      - "traefik.http.routers.grafana.middlewares=strip-remote-user@file,default-chain@file"
      - "traefik.http.routers.grafana-tor.rule=HostRegexp(`^${GRAFANA_SUBDOMAIN:-grafana}\\.[a-z2-7]{16,56}\\.onion`)"
      - "traefik.http.routers.grafana-tor.entrypoints=tor-http"
      - "traefik.http.routers.grafana-tor.service=grafana"
      - "traefik.http.routers.grafana-tor.middlewares=tor-authelia-chain@file"
      - "homepage.group=Monitoring"
      - "homepage.name=Grafana"
      - "homepage.icon=grafana.png"
      - "homepage.href=https://${GRAFANA_SUBDOMAIN:-grafana}.${DOMAIN}"
