apiVersion: v1
kind: Service
metadata:
  name: tx-builder
  namespace: btc-hot
spec:
  selector:
    app: tx-builder
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tx-builder
  namespace: btc-hot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tx-builder
  template:
    metadata:
      labels:
        app: tx-builder
    spec:
      containers:
        - name: tx-builder
          image: ghcr.io/your-org/tx-builder:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: btc-hot-config
            - secretRef:
                name: btc-hot-secrets
          env:
            - name: SERVICE_NAME
              value: "tx-builder"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20 