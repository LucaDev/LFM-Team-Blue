apiVersion: v1
kind: ConfigMap
metadata:
  name: sparrow-config
  namespace: btc-hot
data:
  BITCOIN_RPC_HOST: "bitcoind-regtest.btc-net.svc.cluster.local"
  BITCOIN_RPC_PORT: "8332"
  BITCOIN_NETWORK: "regtest"
  SPARROW_SERVER_PORT: "8080"
---
apiVersion: v1
kind: Secret
metadata:
  name: sparrow-secrets
  namespace: btc-hot
type: Opaque
data:
  BITCOIN_RPC_USER: dXNlcg==  # base64 encoded 'user'
  BITCOIN_RPC_PASSWORD: cGFzcw==  # base64 encoded 'pass'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sparrow
  namespace: btc-hot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sparrow
  template:
    metadata:
      labels:
        app: sparrow
    spec:
      containers:
      - name: sparrow
        image: sparrow:latest  # Build from deploy/services/sparrow/Dockerfile
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: sparrow-config
        - secretRef:
            name: sparrow-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: sparrow
  namespace: btc-hot
spec:
  selector:
    app: sparrow
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sparrow-netpol
  namespace: btc-hot
spec:
  podSelector:
    matchLabels:
      app: sparrow
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: btc-hot
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: btc-net
      podSelector:
        matchLabels:
          app: bitcoind
    ports:
    - protocol: TCP
      port: 8332