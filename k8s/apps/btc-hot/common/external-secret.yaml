apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: btc-hot-signing-keys
  namespace: btc-hot
spec:
  refreshInterval: 15s
  secretStoreRef:
    name: bitwarden-login
    kind: ClusterSecretStore
  target:
    name: btc-hot-signing-keys
    creationPolicy: Owner
  data:
  - secretKey: HOT_SIGNING_KEY
    remoteRef:
      key: btc-hot-signing-key-id  # Bitwarden item ID or name
      property: password  # Assuming password field holds the KMS KeyId
  - secretKey: HOT_SIGNING_PUBKEY
    remoteRef:
      key: btc-hot-signing-pubkey  # Bitwarden item ID or name
      property: username  # Assuming username field holds the pubkey