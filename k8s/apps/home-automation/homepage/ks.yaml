apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &appname homepage
  namespace: flux-system
spec:
  interval: 1h
  path: "./k8s/apps/home-automation/homepage/app"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false # no flux ks dependents
  dependsOn:
    - name: external-secrets-stores
  postBuild:
    substitute:
      APP: *appname
