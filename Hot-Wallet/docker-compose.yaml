services:

  tx-builder:
    build: ./services/tx-builder
    container_name: tx-builder
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    mem_limit: 512m
    pids_limit: 200
    user: "1000:1000"
    environment:
      PYTHONDONTWRITEBYTECODE: "1"

      SERVICE_NAME: tx-builder
      NATS_URL: nats://txbuilder:${TXB_NATS_PASS}@nats:4222

      MIDDLEWARE_URL: http://middleware:8080

      BITCOIN_NETWORK: regtest
      BTC_CORE_RPC_URL: http://btc-core:18443
      BTC_CORE_RPC_USER: ${BTC_RPC_USER_TXB}
      BTC_CORE_RPC_PASS: ${BTC_RPC_PASS_TXB}

    depends_on:
      - nats
      - postgres


  middleware:
    build: ./services/middleware
    container_name: middleware
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    mem_limit: 512m
    pids_limit: 200
    user: "1000:1000"
    environment:
      PYTHONDONTWRITEBYTECODE: "1" 

      SERVICE_NAME: middleware

      NATS_URL: nats://middleware:${MW_NATS_PASS}@nats:4222
      OPERATOR_TOKEN: ${OPERATOR_TOKEN}

      OPA_URL: http://opa:8181
      
      SIGNER_URL: http://10.10.0.2
      SIGNER_PORT: 8080

      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${MW_DB_USER}
      POSTGRES_PASSWORD: ${MW_DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

      BITCOIN_NETWORK: regtest
      BTC_CORE_RPC_URL: http://btc-core:18443
      BTC_CORE_RPC_USER: ${BTC_RPC_USER_MW}
      BTC_CORE_RPC_PASS: ${BTC_RPC_PASS_MW}

      SIGNER_HMAC_SECRET: /run/secrets/signer-hmac.secret
      REFILL_PSBT:  /run/refill.psbt
      WALLET_DIR: /root/.bitcoin/regtest/wallets
    depends_on:
      - nats
      - opa
    volumes:
      - btcCore_data:/root/.bitcoin
      - ./middleware_data/wallets:/run/wallets:ro
      - ./middleware_data/secrets:/run/secrets:ro
      - ./middleware_data:/run
    ports:
    - "8080:8080"

  opa:
    image: openpolicyagent/opa:1.17.1
    container_name: opa
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    mem_limit: 256m
    pids_limit: 100
    command:
      - "run"
      - "--watch"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "/policies"
      - "/data"
    volumes:
      - ./services/opa/policies:/policies:ro
      - ./services/opa/data:/data:ro

  nats:
    image: nats:2.10
    container_name: nats
    command: ["-c", "/etc/nats/nats-server.conf"]
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    mem_limit: 256m
    pids_limit: 100
    environment:
      MW_NATS_PASS: ${MW_NATS_PASS}
      TXB_NATS_PASS: ${TXB_NATS_PASS}
      OPERATOR_NATS_PASS: ${OPERATOR_NATS_PASS}
      SETUP_NATS_PASS: ${SETUP_NATS_PASS}
    volumes:
      - ./services/nats/nats-server.conf:/etc/nats/nats-server.conf:ro

  postgres:
    image: postgres:16
    container_name: postgres
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID]
    mem_limit: 1g
    pids_limit: 200
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

      MW_DB_USER: ${MW_DB_USER}
      MW_DB_PASSWORD: ${MW_DB_PASSWORD}
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./services/postgres/001_psbt.sql:/docker-entrypoint-initdb.d/001_psbt.sql:ro
    - ./services/postgres/002_grant.sh:/docker-entrypoint-initdb.d/002_grant.sh:ro 

  btc-core:
    build: ./services/btc-core
    container_name: btc-core
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    mem_limit: 2g
    pids_limit: 300
    security_opt:
      - no-new-privileges:true
    environment:
      BTC_RPC_USER: ${BTC_RPC_USER}
      BTC_RPC_PASS: ${BTC_RPC_PASS}
    volumes:
      - btcCore_data:/root/.bitcoin
      - ./services/btc-core/src/bitcoin.conf:/root/.bitcoin/bitcoin.conf:ro
      - ./services/btc-core/src/rpcauth.conf:/root/.bitcoin/rpcauth.conf:ro
    entrypoint: ["/root/entrypoint.sh"]
  

  

volumes:
  postgres_data:
  middleware_data:
  btcCore_data:
