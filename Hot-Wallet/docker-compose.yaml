services:

  tx-builder:
    build: ./services/tx-builder
    container_name: tx-builder
    environment:
      SERVICE_NAME: tx-builder
      NATS_URL: nats://txbuilder:${TXB_NATS_PASS}@nats:4222
      WORK_ROOT: /run/psbts

      DATABASE_URL: postgresql://user:pass@postgres:5432/btc

      MIDDLEWARE_URL: http://middleware:8080

      BITCOIN_NETWORK: regtest
      BITCOIND_RPC_URL: http://btc-core:18443
      BITCOIND_RPC_USER: user
      BITCOIND_RPC_PASS: pass

    volumes:
      - tx_builder_data:/run/psbts
    depends_on:
      - nats
      - postgres


  middleware:
    build: ./services/middleware
    container_name: middleware
    environment:
      SERVICE_NAME: middleware

      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: btc

      NATS_URL: nats://middleware:${MW_NATS_PASS}@nats:4222
      OPERATOR_TOKEN: ${OPERATOR_TOKEN}

      OPA_URL: http://opa:8181

      SIGNER_URL: http://10.10.0.2
      SIGNER_PORT: 8080

      BITCOIN_NETWORK: regtest
      BTC-CORE_RPC_URL: http://btc-core:18443
      BTC-CORE_RPC_USER: user
      BTC-CORE_RPC_PASS: pass

      SIGNER_HMAC_SECRET: /run/secrets/signer-hmac.secret
      REFILL_PSBT:  /run/refill.psbt
      WALLET_DIR: /root/.bitcoin/regtest/wallets
    depends_on:
      - nats
      - opa
    volumes:
      - btcCore_data:/root/.bitcoin
      - ./middleware_data/wallets:/run/wallets:ro
      - ./middleware_data/secrets:/run/secrets:ro
      - ./middleware_data:/run
    ports:
    - "8080:8080"

  opa:
    image: openpolicyagent/opa:1.17.1
    container_name: opa
    command:
      - "run"
      - "--watch"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "/policies"
      - "/data"
    volumes:
      - ./services/opa/policies:/policies:ro
      - ./services/opa/data:/data:ro

  nats:
    image: nats:2.10
    container_name: nats
    command: ["-c", "/etc/nats/nats-server.conf"]
    environment:
      MW_NATS_PASS: ${MW_NATS_PASS}
      TXB_NATS_PASS: ${TXB_NATS_PASS}
      OPERATOR_NATS_PASS: ${OPERATOR_NATS_PASS}
      SETUP_NATS_PASS: ${SETUP_NATS_PASS}
    volumes:
      - ./services/nats/nats-server.conf:/etc/nats/nats-server.conf:ro

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: btc
    volumes:
    - postgres_data:/run/postgresql/data
    - ./services/postgres/001_psbt.sql:/docker-entrypoint-initdb.d/001_psbt.sql:ro

  btc-core:
    build: ./services/btc-core
    container_name: btc-core
    restart: unless-stopped
    volumes:
      - btcCore_data:/root/.bitcoin
      - ./services/btc-core/src/bitcoin.conf:/root/.bitcoin/bitcoin.conf:ro
    entrypoint: ["/root/entrypoint.sh"]
  

  

volumes:
  tx_builder_data:
  postgres_data:
  middleware_data:
  btcCore_data:
