MIDDLEWARE_PERMS = {
  publish = { allow = [
    "intent.created", "psbt.build.requested", "psbt.created",
    "wallet.import.done", "wallet.import.failed"
  ] }
  subscribe = { allow = [
    "intent.created", "psbt.created", "psbt.failed",
    "wallet.import.requested"
  ] }
}

TXBUILDER_PERMS = {
  publish   = { allow = ["psbt.created", "psbt.failed"] }
  subscribe = { allow = ["psbt.build.requested"] }
}

OPERATOR_PERMS = {
  publish   = { allow = ["intent.created"] }
  # kein subscribe -> per default deny
}

SETUP_PERMS = {
  publish   = { allow = ["wallet.import.requested"] }
  subscribe = { allow = ["wallet.import.done", "wallet.import.failed"] }
}

authorization {
  users = [
    { user: "middleware", password: $MW_NATS_PASS,       permissions: $MIDDLEWARE_PERMS }
    { user: "txbuilder",  password: $TXB_NATS_PASS,       permissions: $TXBUILDER_PERMS }
    { user: "operator",   password: $OPERATOR_NATS_PASS,  permissions: $OPERATOR_PERMS }
    { user: "setup",      password: $SETUP_NATS_PASS,     permissions: $SETUP_PERMS }
  ]
}